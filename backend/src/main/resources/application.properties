# =====================================================
# COGNICARE+ APPLICATION PROPERTIES
# =====================================================

# Server Configuration
server.port=8080
spring.application.name=CogniCare+

# SQL Server Database Configuration
# Update these values for your SQL Server instance
spring.datasource.url=jdbc:sqlserver://localhost\\SQLEXPRESS;databaseName=CogniCareDB;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=Sam@2004
spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=./uploads

# JWT Configuration
jwt.secret=CogniCarePlusSecretKey2024VeryLongSecretKeyForJWTTokenGeneration123456789
jwt.expiration=86400000

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.com.cognicare=DEBUG
